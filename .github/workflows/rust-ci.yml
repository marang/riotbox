name: Rust CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  rust-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux audio build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes libasound2-dev

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo test
        run: cargo test

      - name: audio QA smoke gate
        run: |
          cargo test -p riotbox-audio --bin w30_preview_render --bin w30_preview_compare --bin lane_recipe_pack --bin feral_before_after_pack --bin feral_grid_pack
          cargo test -p riotbox-app --bin observer_audio_correlate
          cargo run -p riotbox-app --bin observer_audio_correlate -- --observer crates/riotbox-app/tests/fixtures/observer_audio_correlation/events.ndjson --manifest crates/riotbox-app/tests/fixtures/observer_audio_correlation/manifest.json --require-evidence
          tmp="$(mktemp)"
          cargo run -p riotbox-app --bin observer_audio_correlate -- --observer crates/riotbox-app/tests/fixtures/observer_audio_correlation/events.ndjson --manifest crates/riotbox-app/tests/fixtures/observer_audio_correlation/manifest.json --output "$tmp" --json
          jq -e '.schema == "riotbox.observer_audio_summary.v1" and .schema_version == 1 and .control_path.present == true and .output_path.present == true and (.output_path.issues | length == 0)' "$tmp"
          python3 scripts/validate_observer_audio_summary_json.py "$tmp"
          rm "$tmp"
          python3 scripts/validate_observer_audio_summary_json.py crates/riotbox-app/tests/fixtures/observer_audio_correlation/summary_valid_failure.json
          if python3 scripts/validate_observer_audio_summary_json.py crates/riotbox-app/tests/fixtures/observer_audio_correlation/summary_invalid_schema.json; then
            echo "expected invalid observer/audio summary fixture to fail" >&2
            exit 1
          fi
          python3 scripts/validate_listening_manifest_json.py crates/riotbox-audio/tests/fixtures/listening_manifest/manifest_valid.json
          python3 scripts/validate_listening_manifest_json.py crates/riotbox-app/tests/fixtures/observer_audio_correlation/manifest.json
          if python3 scripts/validate_listening_manifest_json.py crates/riotbox-audio/tests/fixtures/listening_manifest/manifest_invalid_schema_version.json; then
            echo "expected invalid listening manifest schema fixture to fail" >&2
            exit 1
          fi
          if python3 scripts/validate_listening_manifest_json.py crates/riotbox-audio/tests/fixtures/listening_manifest/manifest_invalid_boolean_schema_version.json; then
            echo "expected boolean listening manifest schema fixture to fail" >&2
            exit 1
          fi
          if python3 scripts/validate_listening_manifest_json.py crates/riotbox-audio/tests/fixtures/listening_manifest/manifest_invalid_artifact.json; then
            echo "expected invalid listening manifest artifact fixture to fail" >&2
            exit 1
          fi
          generated_tmpdir="$(mktemp -d)"
          trap 'rm -rf "$generated_tmpdir"' EXIT
          python3 scripts/write_synthetic_break_wav.py "$generated_tmpdir/source.wav" 4.0
          cargo run -p riotbox-audio --bin lane_recipe_pack -- --output-dir "$generated_tmpdir/lane-recipe" --duration-seconds 2.0
          python3 scripts/validate_listening_manifest_json.py "$generated_tmpdir/lane-recipe/manifest.json"
          cargo run -p riotbox-audio --bin feral_before_after_pack -- --source "$generated_tmpdir/source.wav" --output-dir "$generated_tmpdir/feral-before-after" --duration-seconds 1.0 --source-window-seconds 0.5
          python3 scripts/validate_listening_manifest_json.py "$generated_tmpdir/feral-before-after/manifest.json"
          cargo run -p riotbox-audio --bin feral_grid_pack -- --source "$generated_tmpdir/source.wav" --output-dir "$generated_tmpdir/feral-grid" --bars 2 --source-window-seconds 0.5
          python3 scripts/validate_listening_manifest_json.py "$generated_tmpdir/feral-grid/manifest.json"
          cargo run -p riotbox-app --bin observer_audio_correlate -- --observer crates/riotbox-app/tests/fixtures/observer_audio_correlation/events.ndjson --manifest "$generated_tmpdir/feral-grid/manifest.json" --require-evidence

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
